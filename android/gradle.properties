org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation computes relative paths between the pub-cache
# and the build dir; on Windows that fails with "different roots" when they're
# on different drives (e.g. pub-cache on C:, project on D:). Disabling it
# trades a bit of rebuild speed for a build that actually completes.
kotlin.incremental=false
